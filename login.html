<script>
  function togglePass(id, btn) {
  const inp = document.getElementById(id);
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁'; }
}

function doLogin() {
  const user  = document.getElementById('login-user').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const keep  = document.getElementById('keep-logged-in').checked;
  const errEl = document.getElementById('login-error');
  errEl.classList.remove('show');

  if (!user || !pass) {
    errEl.textContent = '⚠️ Please fill in all fields.';
    errEl.classList.add('show'); return;
  }

  // Check admin
  if (user === 'admin' && pass === 'Hisab@Admin2026!') {
    const adminUser = { id: 0, name: 'Administrator', username: 'admin', email: 'admin@hisab.app', role: 'admin' };
    State.user = adminUser;
    saveState('user', adminUser);
    localStorage.setItem('hisab_last_login', Date.now());
    // If keep logged in, set a far-future flag
    if (keep) localStorage.setItem('hisab_keep_login', '1');
    else localStorage.removeItem('hisab_keep_login');
    window.location.href = 'admin.html';
    return;
  }

  const result = loginUser(user, pass);
  if (result.error) {
    errEl.textContent = '⚠️ ' + result.error;
    errEl.classList.add('show'); return;
  }
  // Store keep-login preference
  if (keep) localStorage.setItem('hisab_keep_login', '1');
  else localStorage.removeItem('hisab_keep_login');
  window.location.href = 'dashboard.html';
}

document.getElementById('login-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
</script>
