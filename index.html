<script>
  // ── MOBILE MENU ──
  function toggleLandingMenu() {
    const btn = document.getElementById('lmenu-btn');
    const nav = document.getElementById('lmobile-nav');
    const isOpen = nav.classList.toggle('open');
    btn.classList.toggle('open', isOpen);
    document.body.style.overflow = isOpen ? 'hidden' : '';
  }

  // Close on outside click
  document.addEventListener('click', e => {
    const nav = document.getElementById('lmobile-nav');
    const btn = document.getElementById('lmenu-btn');
    if (nav && nav.classList.contains('open') && !nav.contains(e.target) && !btn.contains(e.target)) {
      nav.classList.remove('open');
      btn.classList.remove('open');
      document.body.style.overflow = '';
    }
  });

  // Sticky nav
  window.addEventListener('scroll', () => {
    document.getElementById('lnav').classList.toggle('scrolled', window.scrollY > 10);
  });

  // Scroll-triggered fade-up
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('vis'); });
  }, { threshold: 0.1 });
  document.querySelectorAll('.fup').forEach(el => io.observe(el));

  // Hero items appear on load
  document.querySelectorAll('.lhero .fup').forEach((el, i) => {
    setTimeout(() => el.classList.add('vis'), 80 + i * 160);
  });

  // Language pill sync
  document.querySelectorAll('.lpill button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.lpill button[data-lang="' + btn.dataset.lang + '"]')
        .forEach(b => b.classList.add('active'));
      document.querySelectorAll('.lpill button:not([data-lang="' + btn.dataset.lang + '"])')
        .forEach(b => b.classList.remove('active'));
    });
  });

  // Set nav logo image src
  const navLogoImg = document.getElementById('nav-logo-img');
  if (navLogoImg && LOGO.imageUrl) {
    navLogoImg.src = LOGO.imageUrl;
    navLogoImg.style.mixBlendMode = 'screen';
    navLogoImg.style.filter = 'drop-shadow(0 2px 8px rgba(30,136,229,0.4)) brightness(1.1)';
  }

  // Story carousel manual shift
  let storyOffset = 0;
  function shiftStories(dir) {
    const track = document.getElementById('story-track');
    storyOffset += dir * 362;
    track.style.animation = 'none';
    track.style.transform = 'translateX(' + (-storyOffset) + 'px)';
    track.style.transition = 'transform 0.5s ease';
    setTimeout(() => {
      // Reset loop
      const maxShift = 8 * 362;
      if (storyOffset >= maxShift) { storyOffset = 0; track.style.transition = 'none'; track.style.transform = 'translateX(0)'; }
      if (storyOffset < 0) { storyOffset = (8-1) * 362; track.style.transition = 'none'; track.style.transform = 'translateX(-' + storyOffset + 'px)'; }
    }, 500);
  }
</script>
