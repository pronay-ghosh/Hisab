<script>
// Build country picker on load
document.addEventListener('DOMContentLoaded', () => {
  buildCountryPicker('reg-phone-picker', {
    hiddenId: 'reg-phone-picker-code',
    phoneId:  'reg-phone-picker-phone',
    hintId:   'reg-phone-picker-hint',
    errId:    'reg-phone-picker-err',
  });
});

// ── USERNAME HELPERS ──
let suggestedUsername = '';

function onNameInput(name) {
  if (!name) return;
  suggestedUsername = generateUsername(name);
  const suggest = document.getElementById('username-suggest');
  suggest.textContent = (State.lang === 'bn' ? '💡 প্রস্তাবিত ইউজারনেম: ' : '💡 Suggested username: ') + suggestedUsername;
  suggest.classList.add('show');
  if (!document.getElementById('reg-username').value)
    document.getElementById('reg-username').value = suggestedUsername;
}

function acceptSuggestion() {
  document.getElementById('reg-username').value = suggestedUsername;
  document.getElementById('username-suggest').classList.remove('show');
}

function onUsernameInput() {
  document.getElementById('username-suggest').classList.remove('show');
  document.getElementById('username-error').classList.remove('show');
}

// ── EMAIL LIVE CHECK ──
function liveEmailCheck(input) {
  const val   = input.value.trim();
  const valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val);
  const err   = document.getElementById('reg-email-err');
  if (val && !valid) { err.classList.add('show'); input.classList.add('error'); }
  else               { err.classList.remove('show'); input.classList.remove('error'); }
}

// ── PASSWORD ──
function togglePass(id, btn) {
  const inp = document.getElementById(id);
  inp.type  = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

function checkStrength() {
  renderPasswordStrength(
    document.getElementById('reg-pass').value,
    'strength-fill', 'strength-label'
  );
  checkConfirm();
}

function checkConfirm() {
  const pass    = document.getElementById('reg-pass').value;
  const confirm = document.getElementById('reg-confirm').value;
  const err     = document.getElementById('confirm-error');
  if (err) { if (confirm && pass !== confirm) err.classList.add('show'); else err.classList.remove('show'); }
}

// ── REGISTER SUBMIT ──
function doRegister() {
  const errEl = document.getElementById('reg-error');
  errEl.classList.remove('show');

  const name     = document.getElementById('reg-name').value.trim();
  const username = document.getElementById('reg-username').value.trim() || generateUsername(name);
  const email    = document.getElementById('reg-email').value.trim();
  const pass     = document.getElementById('reg-pass').value;
  const confirm  = document.getElementById('reg-confirm').value;
  const terms    = document.getElementById('reg-terms').checked;

  if (!name || !email || !pass) {
    errEl.textContent = '⚠️ Please fill in all required fields.'; errEl.classList.add('show'); return;
  }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    errEl.textContent = '⚠️ Please enter a valid email address.'; errEl.classList.add('show'); return;
  }

  // Mobile validation via shared picker
  const phoneOk = cpValidate('reg-phone-picker');
  if (!phoneOk) {
    errEl.textContent = '⚠️ Please enter a valid mobile number.'; errEl.classList.add('show'); return;
  }
  const phone = cpGetValue('reg-phone-picker');

  if (pass !== confirm) {
    errEl.textContent = '⚠️ Passwords do not match.'; errEl.classList.add('show'); return;
  }
  const pwdErrors = validatePasswordRules(pass);
  if (pwdErrors.length) {
    errEl.textContent = '⚠️ ' + pwdErrors[0]; errEl.classList.add('show'); return;
  }
  if (!terms) {
    errEl.textContent = '⚠️ Please accept the Terms of Service.'; errEl.classList.add('show'); return;
  }

  const result = registerUser({ name, username, email, phone, password: pass });
  if (result.error) {
    errEl.textContent = '⚠️ ' + result.error    errEl.classList.add('show'); return;
  }
  // Success — redirect to dashboard
  window.location.href = 'dashboard.html';
}
</script>
